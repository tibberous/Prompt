# =============================================================================
# build_info.ini — single source of truth for EVERY string baked into the
# built artifacts (.exe + installers). Every executable builder
# (PyInstaller, Nuitka, cx_Freeze, PyApp, PyInstallerDir) reads from here.
# So do the NSIS/Inno/WiX installer script generators.
#
# Edit values here, rebuild, and the new strings show up in:
#   - File Explorer > Properties > Details (standard VERSIONINFO fields)
#   - Installer "Publisher" / "Help URL" / "Phone" entries in Add/Remove Programs
#   - Resource-Hacker, Sigcheck, PEStudio, 7-Zip Properties (custom fields too)
# =============================================================================

# -----------------------------------------------------------------------------
# Standard Win32 VERSIONINFO StringFileInfo fields — these are the 10 names
# Microsoft defined; the Properties dialog will only display these.
# -----------------------------------------------------------------------------
[metadata]
# Publisher / author. Shown by Explorer as "Company".
company = Trenton Tompkins
# Marketing / product name (suite name).
app_name = Prompt
# Internal short identifier (no spaces). Pre-rename name.
internal_name = Prompt
# 4-part build number (a.b.c.d). Used for both FileVersion and ProductVersion.
version = 1.0.0.0
# Human description shown in Explorer tooltip / taskbar.
description = Prompt — debugging, prompt, workflow & doctype engine
# Original built-as filename.
original_filename = Prompt.exe
# Legal copyright string. Put your license name here so the SHA-locked
# binary itself self-identifies its license terms.
copyright = (c) 2026 Trenton Tompkins. Released under the MIT License.
# ™ / ® notice. Leave blank if you have none.
trademarks =
# Catch-all free-form field — Explorer's Properties dialog renders it.
# Pack any extra contact info / URL / phone here since none of those have
# their own dedicated Microsoft field.
comments = https://trentontompkins.com  ·  (724) 431-5207  ·  trenttompkins@gmail.com  ·  MIT License

# -----------------------------------------------------------------------------
# Custom string fields — added to the VERSIONINFO resource alongside the
# standard ones. Visible in: PowerShell (Get-Item …).VersionInfo, Sigcheck,
# PEStudio, ResourceHacker, 7-Zip > Properties tab. NOT visible in the
# stock Windows Properties dialog (Microsoft hardcoded that list).
# -----------------------------------------------------------------------------
[metadata_custom]
author    = Trenton Tompkins <trenttompkins@gmail.com>
license   = MIT
website   = https://trentontompkins.com
github    = https://github.com/tibberous
phone     = 724-431-5207
email     = trenttompkins@gmail.com
# Optional — credit who/what wrote the codegen.
coded_by  = ChatGPT 5.5 Thinking / Claude

# -----------------------------------------------------------------------------
# Installer-only metadata — used by NSIS, Inno Setup, and WiX/MSI scripts
# but NOT baked into the .exe VERSIONINFO. Add/Remove Programs reads these.
# -----------------------------------------------------------------------------
[installer]
# Add/Remove Programs > "Help link"
help_url    = https://trentontompkins.com
# Add/Remove Programs > "Update Information"
update_url  = https://trentontompkins.com
# Add/Remove Programs > "Support telephone"
phone       = 724-431-5207
# WiX MSI Manufacturer / Inno AppPublisher / NSIS VIAddVersionKey Publisher.
publisher   = Trenton Tompkins
# WiX MSI ProductCode UUID — REGENERATE for a brand-new product, KEEP STABLE
# across versions of the same product (or the MSI will install side-by-side).
# Leave blank to let the builder generate a deterministic one from product name.
product_uuid =
# WiX UpgradeCode UUID — MUST stay stable across versions so upgrades replace
# the old MSI cleanly. Generate once via `python -c "import uuid; print(uuid.uuid4())"`
# and never change it.
upgrade_uuid =
